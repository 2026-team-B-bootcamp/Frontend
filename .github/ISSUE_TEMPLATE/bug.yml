name: 버그 리포트
description: 오동작하는 부분을 신고합니다
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: 무슨 문제가 있나요?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 재현 방법
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: 기대한 동작
    validations:
      required: false
