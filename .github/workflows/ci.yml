name: CI

on:
  push:
    branches: [main, release]
  pull_request:
    # release는 배포 브랜치다(Vercel Production Branch). main → release PR에서도
    # lint/build가 돌아야 깨진 빌드가 프로덕션으로 넘어가지 않는다.
    branches: [main, release]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      # 테스트 코드가 생기면 여기에 추가
      # - run: npm test
