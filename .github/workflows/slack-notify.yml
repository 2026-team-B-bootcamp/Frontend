name: Slack Notify

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  notify:
    name: Slack Notification
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      # SLACK_WEBHOOK_URL secret이 설정되기 전까지는 조용히 스킵됨.
      # Slack 워크스페이스에서 Incoming Webhook 만들고 나서 repo secret으로 등록하면 활성화됨.
      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          TITLE: ${{ github.event.pull_request.title }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUM: ${{ github.event.pull_request.number }}
          ADDITIONS: ${{ github.event.pull_request.additions }}
          DELETIONS: ${{ github.event.pull_request.deletions }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          REPO_URL: ${{ github.event.repository.html_url }}
          REPO: ${{ github.event.repository.full_name }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          SHORT_SHA="${MERGE_SHA:0:7}"
          COMMIT_URL="${REPO_URL}/commit/${MERGE_SHA}"

          TYPE_EMOJI="📦"
          case "${TITLE}" in
            feat*)     TYPE_EMOJI="✨" ;;
            fix*)      TYPE_EMOJI="🐛" ;;
            docs*)     TYPE_EMOJI="📝" ;;
            chore*)    TYPE_EMOJI="🔧" ;;
            refactor*) TYPE_EMOJI="♻️" ;;
            test*)     TYPE_EMOJI="🧪" ;;
          esac

          curl -s -X POST "${SLACK_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d @- <<PAYLOAD
          {
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${TYPE_EMOJI} *<${PR_URL}|#${PR_NUM}>* merged to \`main\`\n*${TITLE}*"
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "👤 *${AUTHOR}*  ·  📊 \`+${ADDITIONS}\` \`-${DELETIONS}\`  ·  🏷️ \`${SHORT_SHA}\`"
                  }
                ]
              },
              {
                "type": "divider"
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "<${PR_URL}|View PR>  ·  <${COMMIT_URL}|View Commit>  ·  ${REPO}"
                  }
                ]
              }
            ]
          }
          PAYLOAD
